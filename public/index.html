<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pricewise</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --line: #2a2f3a;
        --text: #e8ebf0;
        --muted: #9aa3b2;
        --accent: #5db07e;
        --chip: #232833;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap { max-width: 980px; margin: 0 auto; padding: 28px 20px 60px; }
      header.top { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
      header.top .logo { display: block; flex: none; }
      h1 { font-size: 26px; margin: 0; letter-spacing: -0.02em; }
      .sub { color: var(--muted); font-size: 13px; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 26px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 18px;
      }
      .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
      .card .value { font-size: 30px; font-weight: 600; margin-top: 6px; font-variant-numeric: tabular-nums; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--line); vertical-align: middle; }
      th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
      tbody tr.discounted { background: rgba(93, 176, 126, 0.09); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .time { color: var(--muted); white-space: nowrap; font-variant-numeric: tabular-nums; }
      .amount { font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .badge {
        display: inline-block; margin-left: 8px; padding: 1px 7px; border-radius: 999px;
        background: var(--accent); color: #0b0d10; font-size: 11px; font-weight: 700;
      }
      .chips { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
      .chip {
        background: var(--chip); border: 1px solid var(--line); color: var(--muted);
        border-radius: 6px; padding: 2px 8px; font-size: 12px; white-space: nowrap;
      }
      .arrow { color: var(--muted); }
      .final { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }
      .empty { color: var(--muted); padding: 24px 12px; }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <svg class="logo" width="24" height="24" viewBox="0 0 20 20" fill="none" role="img" aria-label="Pricewise">
          <rect x="2.5" y="3.8" width="7" height="3" rx="1" fill="var(--text)" />
          <rect x="6.5" y="8.5" width="7" height="3" rx="1" fill="var(--text)" />
          <rect x="10.5" y="13.2" width="7" height="3" rx="1" fill="var(--text)" />
        </svg>
        <h1>Pricewise</h1>
        <span class="sub"><span class="dot"></span>live settled charges · Tempo Moderato</span>
      </header>

      <section class="cards">
        <div class="card"><div class="label">Revenue</div><div class="value" id="revenue">$0.00</div></div>
        <div class="card"><div class="label">Requests</div><div class="value" id="count">0</div></div>
        <div class="card"><div class="label">Avg price</div><div class="value" id="avg">$0.00</div></div>
      </section>

      <table>
        <thead>
          <tr><th>Time</th><th>Caller</th><th>Resource</th><th>Price breakdown</th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="4" class="empty">Waiting for settled charges…</td></tr>
        </tbody>
      </table>
    </div>

    <script>
      // Amounts are stored in pathUSD dollars (e.g. 0.085). Format with a min of 2 decimals.
      function usd(n) {
        let s = Number(n).toFixed(6).replace(/0+$/, '');
        if (s.endsWith('.')) s = s.slice(0, -1);
        const dot = s.indexOf('.');
        if (dot === -1) s += '.00';
        else { const dec = s.length - dot - 1; if (dec < 2) s += '0'.repeat(2 - dec); }
        return '$' + s;
      }
      function shortAddr(a) {
        if (!a) return 'anon';
        return a.length > 12 ? a.slice(0, 6) + '…' + a.slice(-4) : a;
      }
      function hhmmss(ts) {
        const d = new Date(ts);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
      }
      function esc(s) { return String(s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

      function breakdownHtml(breakdown, finalAmount) {
        const items = (breakdown || []).map((b, i) =>
          i === 0
            ? `<span class="chip">${esc(b.note)} ${usd(b.amount)}</span>`
            : `<span class="chip">${esc(b.note)}</span>`
        );
        return `<div class="chips">${items.join('<span class="arrow">·</span>')}` +
          `<span class="arrow">→</span><span class="final">${usd(finalAmount)}</span></div>`;
      }

      function rowHtml(e) {
        const base = e.breakdown && e.breakdown.length ? e.breakdown[0].amount : e.amount;
        const pct = base > 0 ? Math.round((1 - e.amount / base) * 100) : 0;
        const discounted = pct > 0;
        const badge = discounted ? `<span class="badge">−${pct}%</span>` : '';
        return `<tr class="${discounted ? 'discounted' : ''}">` +
          `<td class="time">${hhmmss(e.ts)}</td>` +
          `<td class="mono">${esc(shortAddr(e.source))}${badge}</td>` +
          `<td class="mono">${esc(e.resource)}</td>` +
          `<td>${breakdownHtml(e.breakdown, e.amount)}</td>` +
          `</tr>`;
      }

      async function tick() {
        try {
          const [stats, evs] = await Promise.all([
            fetch('/api/stats').then((r) => r.json()),
            fetch('/api/events').then((r) => r.json()),
          ]);
          document.getElementById('revenue').textContent = usd(stats.revenue);
          document.getElementById('count').textContent = stats.count;
          document.getElementById('avg').textContent = usd(stats.avgPrice);

          const rows = (evs.events || []);
          const tbody = document.getElementById('rows');
          tbody.innerHTML = rows.length
            ? rows.map(rowHtml).join('')
            : '<tr><td colspan="4" class="empty">Waiting for settled charges…</td></tr>';
        } catch (err) {
          // keep last render on transient errors
        }
      }

      tick();
      setInterval(tick, 1500);
    </script>
  </body>
</html>
